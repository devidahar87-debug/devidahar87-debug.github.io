<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Statement Converter</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="banks.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .converter-card {
            max-width: 600px;
            background: white;
            margin: 0 auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: left;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        .step {
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4a5568;
        }
        input[type="file"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        button {
            width: 100%;
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 15px;
        }
        button:hover {
            background-color: #2b6cb0;
        }
        #status {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            color: #4a5568;
        }
    </style>
</head>
<body>

<div class="converter-card">
    <h2>Statement Converter</h2>
    <hr style="border: 0; border-top: 1px solid #e2e8f0; margin-bottom: 25px;">

    <div class="step">
        <label for="pdfFile">1. Upload Bank Statement (PDF)</label>
        <input type="file" id="pdfFile" accept=".pdf" />
    </div>

    <div class="step">
        <label for="bankSelect">2. Choose Your Bank</label>
        <select id="bankSelect">
            <option value="generic">Generic / Standard Layout</option>
            <option value="Bank Islam">Bank Islam</option>
            <option value="CIMB">CIMB Bank</option>
            <option value="MBB">Maybank</option>
        </select>
    </div>

    <div class="step">
        <label>3. Select Export Format</label>
        <div class="radio-group">
            <label class="radio-option">
                <input type="radio" name="formatSelect" value="xlsx" checked> Excel (.xlsx)
            </label>
            <label class="radio-option">
                <input type="radio" name="formatSelect" value="csv"> CSV (.csv)
            </label>
        </div>
    </div>

    <button onclick="processStatement()">Convert & Download</button>

    <div id="status"></div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    async function processStatement() {
        const fileInput = document.getElementById('pdfFile');
        const bank = document.getElementById('bankSelect').value;
        const format = document.querySelector('input[name="formatSelect"]:checked').value;
        const status = document.getElementById('status');

        if (fileInput.files.length === 0) {
            status.innerHTML = "<span style='color: #e53e3e;'>Please upload a file.</span>";
            return;
        }

        status.style.color = "#3182ce";
        status.innerText = `Processing ${bank.toUpperCase()} statement...`;

        const file = fileInput.files[0];
        const fileReader = new FileReader();

        fileReader.onload = async function () {
            try {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;

                // Structured data array: holding our rows as arrays [Date, Description, Amount]
                let tableData = [["Date", "Description", "Amount"]]; // Header row

                // Loop through PDF pages
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();

                    let lastY = null;
                    let currentRowItems = [];

                    for (let item of textContent.items) {
                        let currentY = item.transform[5];

                        if (lastY !== null && Math.abs(currentY - lastY) > 4) {
                            if (currentRowItems.length > 0) {
                                let rowText = currentRowItems.join(" ");
                                let parsedRow = parseRowByBank(rowText, bank);
                                if (parsedRow) tableData.push(parsedRow);
                            }
                            currentRowItems = [];
                        }
                        if (item.str.trim()) {
                            currentRowItems.push(item.str.trim());
                        }
                        lastY = currentY;
                    }
                    // Handle the last row of the page
                    if (currentRowItems.length > 0) {
                        let rowText = currentRowItems.join(" ");
                        let parsedRow = parseRowByBank(rowText, bank);
                        if (parsedRow) tableData.push(parsedRow);
                    }
                }

                // Trigger the file download based on choice
                if (format === 'xlsx') {
                    exportToExcel(tableData, "Extract_Statement.xlsx");
                } else {
                    exportToCSV(tableData, "Extract_Statement.csv");
                }

                status.style.color = "#38a169";
                status.innerText = "Success! Check your downloads folder.";

            } catch (error) {
                console.error(error);
                status.innerHTML = "<span style='color: #e53e3e;'>Error reading PDF structure.</span>";
            }
        };

        fileReader.readAsArrayBuffer(file);
    }

    // Helper: Generate Excel file using SheetJS
    function exportToExcel(data, filename) {
        const worksheet = XLSX.utils.aoa_to_sheet(data);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Transactions");
        XLSX.writeFile(workbook, filename);
    }

    // Helper: Generate clean CSV string
    function exportToCSV(data, filename) {
        let csvContent = data.map(row => row.map(val => `"${val}"`).join(",")).join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", filename);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>

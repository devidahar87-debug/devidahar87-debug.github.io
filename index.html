<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Statement Converter</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="banks.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .converter-card {
            max-width: 600px;
            background: white;
            margin: 0 auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: left;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        .step {
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4a5568;
        }
        input[type="file"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        button {
            width: 100%;
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 15px;
        }
        button:hover {
            background-color: #2b6cb0;
        }
        #status {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            color: #4a5568;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="converter-card">
    <h2>Statement Converter</h2>
    <hr style="border: 0; border-top: 1px solid #e2e8f0; margin-bottom: 25px;">

    <div class="step">
        <label for="pdfFile">1. Upload Bank Statement (PDF)</label>
        <input type="file" id="pdfFile" accept=".pdf" />
    </div>

    <div class="step">
        <label for="bankSelect">2. Choose Your Bank</label>
        <select id="bankSelect">
            <option value="Maybank">Maybank</option>
            <option value="Bank Islam">Bank Islam</option>
            <option value="Public Bank">Public Bank</option>
            <option value="CIMB">CIMB</option>
            <option value="AmBank">AmBank</option>
            <option value="Agrobank">Agrobank</option>
        </select>
    </div>

    <div class="step">
        <label>3. Select Export Format</label>
        <div class="radio-group">
            <label class="radio-option">
                <input type="radio" name="formatSelect" value="xlsx" checked> Excel (.xlsx)
            </label>
            <label class="radio-option">
                <input type="radio" name="formatSelect" value="csv"> CSV (.csv)
            </label>
        </div>
    </div>

    <button onclick="processStatement()">Convert & Download</button>

    <div id="status"></div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    async function processStatement() {
        const fileInput = document.getElementById('pdfFile');
        const bank = document.getElementById('bankSelect').value;
        const format = document.querySelector('input[name="formatSelect"]:checked').value;
        const statusDiv = document.getElementById('status');

        if (fileInput.files.length === 0) {
            statusDiv.innerHTML = "<span style='color: #e53e3e;'>❌ Please upload a PDF file.</span>";
            return;
        }

        // Show loading status
        statusDiv.innerHTML = '<div class="loading"></div> Processing PDF...';

        const file = fileInput.files[0];

        try {
            // Read the PDF file
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

            const pageTexts = [];
            let fullText = "";

            // Extract text from each page
            for (let i = 1; i <= pdf.numPages; i++) {
                statusDiv.innerHTML = `<div class="loading"></div> Processing page ${i} of ${pdf.numPages}...`;

                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();

                // Extract text items and group them into lines
                const lines = [];
                let lastY = null;
                let currentLine = [];

                for (const item of textContent.items) {
                    const y = item.transform[5];

                    if (lastY !== null && Math.abs(y - lastY) > 5) {
                        if (currentLine.length > 0) {
                            lines.push(currentLine.join(' '));
                            currentLine = [];
                        }
                    }

                    if (item.str && item.str.trim()) {
                        currentLine.push(item.str.trim());
                        fullText += " " + item.str;
                    }

                    lastY = y;
                }

                if (currentLine.length > 0) {
                    lines.push(currentLine.join(' '));
                }

                pageTexts.push(lines.join('\n'));
            }

            statusDiv.innerHTML = '<div class="loading"></div> Parsing transactions...';

            // Call the master router
            let parsedTransactions = masterBankRouter(bank, pageTexts, fullText);

            if (!parsedTransactions || parsedTransactions.length === 0) {
                statusDiv.innerHTML = "<span style='color: #e53e3e;'>❌ No transactions found. The PDF format might not be supported for this bank.</span>";
                return;
            }

            // Prepare data for export
            const tableData = [["Date", "Bank Remark", "Debit", "Credit", "Balance"]];

            parsedTransactions.forEach(tx => {
                tableData.push([
                    tx.Date || "",
                    tx["Bank Remark"] || "",
                    tx.Debit && tx.Debit !== 0 ? tx.Debit : "",
                    tx.Credit && tx.Credit !== 0 ? tx.Credit : "",
                    tx.Balance || ""
                ]);
            });

            statusDiv.innerHTML = '<div class="loading"></div> Generating file...';

            // Export based on selected format
            const filename = `${bank.replace(/\s/g, '_')}_statement_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}`;

            if (format === 'xlsx') {
                const worksheet = XLSX.utils.aoa_to_sheet(tableData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Transactions");
                XLSX.writeFile(workbook, `${filename}.xlsx`);
            } else {
                let csvContent = tableData.map(row =>
                    row.map(cell => {
                        if (typeof cell === 'string' && (cell.includes(',') || cell.includes('"'))) {
                            return `"${cell.replace(/"/g, '""')}"`;
                        }
                        return cell;
                    }).join(',')
                ).join('\n');

                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.setAttribute('download', `${filename}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }

            statusDiv.innerHTML = `<span style='color: #38a169;'>✅ Success! Processed ${parsedTransactions.length} transactions. File downloaded.</span>`;

        } catch (error) {
            console.error('Error:', error);
            statusDiv.innerHTML = `<span style='color: #e53e3e;'>❌ Error: ${error.message}</span>`;
        }
    }
</script>

</body>
</html>

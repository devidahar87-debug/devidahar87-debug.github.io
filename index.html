<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Statement Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .card-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .card-body {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        select, input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }
        select:focus, input[type="file"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .radio-label input {
            margin-right: 8px;
            cursor: pointer;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
            display: none;
            max-height: 500px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .download-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .download-buttons button {
            flex: 1;
        }
        .download-buttons button:first-child {
            background: #28a745;
        }
        .download-buttons button:last-child {
            background: #17a2b8;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .stats {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
            display: none;
        }
        progress {
            width: 100%;
            height: 20px;
            margin-top: 10px;
            border-radius: 10px;
            overflow: hidden;
        }
        progress::-webkit-progress-bar {
            background-color: #f0f0f0;
            border-radius: 10px;
        }
        progress::-webkit-progress-value {
            background-color: #667eea;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1>🏦 Bank Statement Converter</h1>
                <p>Convert your PDF bank statements to Excel or CSV format</p>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>1. Select Bank</label>
                    <select id="bankSelect">
                        <option value="Bank Islam">Bank Islam</option>
                        <option value="Maybank">Maybank</option>
                        <option value="Public Bank">Public Bank</option>
                        <option value="CIMB">CIMB</option>
                        <option value="AmBank">AmBank</option>
                        <option value="Agrobank">Agrobank</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>2. Upload PDF Statement</label>
                    <input type="file" id="pdfFile" accept=".pdf" />
                </div>

                <div class="form-group">
                    <label>3. Export Format</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="format" value="excel" checked> Excel (.xlsx)
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="format" value="csv"> CSV (.csv)
                        </label>
                    </div>
                </div>

                <button onclick="convertPDF()" id="convertBtn">🔄 Convert Statement</button>

                <div id="status" class="status"></div>
                <div id="stats" class="stats"></div>
                <div id="progressContainer" style="display: none;">
                    <progress id="progressBar" value="0" max="100"></progress>
                    <p id="progressText" style="text-align: center; margin-top: 5px; font-size: 12px; color: #666;"></p>
                </div>
                <div id="tableContainer" class="table-container"></div>
                <div class="download-buttons" id="downloadButtons" style="display: none;">
                    <button onclick="downloadExcel()">📊 Download Excel</button>
                    <button onclick="downloadCSV()">📄 Download CSV</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configure PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let currentData = [];
        let currentBank = '';

        // Bank Islam Parser (Fixed)
        function parseBankIslamPage(text) {
            const rows = [];
            const lines = text.split('\n').map(l => l.trim()).filter(l => l && !l.includes('OF 7') && !l.includes('NOMBOR AKAUN'));

            let current = null;

            for (let line of lines) {
                // Skip footer/header lines
                if (line.includes('RINGKASAN AKAUN') || line.includes('SUMMARY OF ACCOUNT') ||
                    line.includes('TOTAL DEBIT') || line.includes('BAL B/F') || line.includes('CAWANGAN BRANCH')) {
                    continue;
                }

                // Match date pattern
                const dateMatch = line.match(/^(\d{1,2}\/\d{2}\/\d{2})/);
                if (dateMatch) {
                    if (current) rows.push(current);

                    const date = dateMatch[1];
                    let remaining = line.substring(date.length).trim();

                    // Extract all amounts
                    const amounts = [];
                    let amountMatch;
                    const amountRegex = /(\d{1,3}(?:,\d{3})*(?:\.\d{2}))/g;
                    while ((amountMatch = amountRegex.exec(remaining)) !== null) {
                        amounts.push(parseFloat(amountMatch[1].replace(/,/g, '')));
                    }

                    let debit = '', credit = '', balance = '';

                    if (amounts.length === 3) {
                        // Format: Debit | Credit | Balance
                        debit = amounts[0];
                        credit = amounts[1];
                        balance = amounts[2];
                    } else if (amounts.length === 2) {
                        // Format: Amount | Balance
                        balance = amounts[1];
                        const amount = amounts[0];
                        const descUpper = remaining.toUpperCase();

                        // Check if it's a credit (money in)
                        if (descUpper.includes('INW') || descUpper.includes('PROFIT PAID') ||
                            (descUpper.includes('TRANSFER') && !descUpper.includes('MB '))) {
                            credit = amount;
                        } else {
                            debit = amount;
                        }
                    } else if (amounts.length === 1) {
                        balance = amounts[0];
                        if (remaining.toUpperCase().includes('PROFIT PAID')) {
                            credit = balance;
                            balance = null;
                        }
                    }

                    // Clean description
                    let desc = remaining;
                    const allAmounts = remaining.match(amountRegex) || [];
                    for (let amt of allAmounts) {
                        desc = desc.replace(amt, '').trim();
                    }
                    desc = desc.replace(/\s+/g, ' ').trim();

                    current = {
                        Date: date,
                        "Bank Remark": desc,
                        Debit: debit || '',
                        Credit: credit || '',
                        Balance: balance || ''
                    };
                } else if (current && !line.includes('HALAMAN')) {
                    current["Bank Remark"] += ' ' + line;
                }
            }

            if (current) rows.push(current);
            return rows;
        }

        // Default parser for other banks
        function parseDefaultBank(text, bankName) {
            const rows = [];
            const lines = text.split('\n');

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                // Look for date pattern
                const dateMatch = line.match(/^(\d{2}\/\d{2})/);
                if (dateMatch && (line.includes('CR') || line.includes('DR') || line.match(/\d+\.\d{2}/))) {
                    const date = dateMatch[1];
                    let remaining = line.substring(date.length).trim();

                    // Extract amounts
                    const amounts = remaining.match(/(\d{1,3}(?:,\d{3})*(?:\.\d{2}))/g) || [];
                    let debit = '', credit = '', balance = '';

                    if (amounts.length >= 2) {
                        balance = parseFloat(amounts[amounts.length - 1].replace(/,/g, ''));
                        const amount = parseFloat(amounts[amounts.length - 2].replace(/,/g, ''));

                        if (remaining.toUpperCase().includes('CR')) {
                            credit = amount;
                        } else {
                            debit = amount;
                        }
                    } else if (amounts.length === 1) {
                        balance = parseFloat(amounts[0].replace(/,/g, ''));
                    }

                    // Clean description
                    let desc = remaining;
                    for (let amt of amounts) {
                        desc = desc.replace(amt, '').trim();
                    }
                    desc = desc.replace(/\s+/g, ' ').trim();

                    rows.push({
                        Date: date,
                        "Bank Remark": desc,
                        Debit: debit,
                        Credit: credit,
                        Balance: balance
                    });
                }
            }

            return rows;
        }

        // Main conversion function
        async function convertPDF() {
            const fileInput = document.getElementById('pdfFile');
            const bank = document.getElementById('bankSelect').value;
            const convertBtn = document.getElementById('convertBtn');
            const statusDiv = document.getElementById('status');
            const statsDiv = document.getElementById('stats');
            const tableContainer = document.getElementById('tableContainer');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            if (!fileInput.files.length) {
                showStatus('Please select a PDF file', 'error');
                return;
            }

            currentBank = bank;
            const file = fileInput.files[0];

            // Show loading
            convertBtn.disabled = true;
            convertBtn.innerHTML = '<span class="loading"></span> Processing...';
            showStatus('Processing PDF file...', 'info');
            tableContainer.style.display = 'none';
            statsDiv.style.display = 'none';
            progressContainer.style.display = 'block';
            document.getElementById('downloadButtons').style.display = 'none';

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                let allText = '';
                const totalPages = pdf.numPages;

                for (let i = 1; i <= totalPages; i++) {
                    progressBar.value = (i / totalPages) * 100;
                    progressText.textContent = `Processing page ${i} of ${totalPages}...`;

                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    allText += pageText + '\n';
                }

                progressText.textContent = 'Parsing transactions...';

                // Parse based on bank
                let transactions = [];
                if (bank === 'Bank Islam') {
                    transactions = parseBankIslamPage(allText);
                } else {
                    transactions = parseDefaultBank(allText, bank);
                }

                if (transactions.length === 0) {
                    throw new Error('No transactions found');
                }

                currentData = transactions;

                // Display stats
                statsDiv.style.display = 'block';
                statsDiv.innerHTML = `
                    ✅ Successfully processed <strong>${transactions.length}</strong> transactions<br>
                    📅 From ${transactions[0]?.Date || 'N/A'} to ${transactions[transactions.length-1]?.Date || 'N/A'}
                `;

                // Display table
                displayTable(transactions);

                showStatus(`✅ Success! Processed ${transactions.length} transactions`, 'success');
                document.getElementById('downloadButtons').style.display = 'flex';

            } catch (error) {
                console.error('Error:', error);
                showStatus(`❌ Error: ${error.message}`, 'error');
            } finally {
                convertBtn.disabled = false;
                convertBtn.innerHTML = '🔄 Convert Statement';
                progressContainer.style.display = 'none';
            }
        }

        function displayTable(data) {
            const tableContainer = document.getElementById('tableContainer');
            const columns = ['Date', 'Bank Remark', 'Debit', 'Credit', 'Balance'];

            let html = '<table><thead><tr>';
            columns.forEach(col => {
                html += `<th>${col}</th>`;
            });
            html += '</tr></thead><tbody>';

            // Show first 100 rows
            const displayData = data.slice(0, 100);
            for (let row of displayData) {
                html += '<tr>';
                columns.forEach(col => {
                    let value = row[col];
                    if (value === null || value === undefined || value === '') value = '-';
                    if (col === 'Debit' && value && value !== '-') value = `RM ${value.toFixed(2)}`;
                    if (col === 'Credit' && value && value !== '-') value = `RM ${value.toFixed(2)}`;
                    if (col === 'Balance' && value && value !== '-') value = `RM ${value.toFixed(2)}`;
                    html += `<td>${value}</td>`;
                });
                html += '</tr>';
            }

            if (data.length > 100) {
                html += `<tr><td colspan="5" style="text-align: center; font-style: italic; color: #666;">
                    ... and ${data.length - 100} more rows. Download the file to see all data.
                </td></tr>`;
            }

            html += '</tbody></table>';
            tableContainer.innerHTML = html;
            tableContainer.style.display = 'block';
        }

        function downloadExcel() {
            if (!currentData.length) return;

            const wsData = [['Date', 'Bank Remark', 'Debit', 'Credit', 'Balance']];
            for (let row of currentData) {
                wsData.push([
                    row.Date || '',
                    row["Bank Remark"] || '',
                    row.Debit || '',
                    row.Credit || '',
                    row.Balance || ''
                ]);
            }

            const ws = XLSX.utils.aoa_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Transactions');
            XLSX.writeFile(wb, `${currentBank.replace(/\s/g, '_')}_statement.xlsx`);

            showStatus('✅ Excel file downloaded successfully!', 'success');
        }

        function downloadCSV() {
            if (!currentData.length) return;

            let csv = 'Date,Bank Remark,Debit,Credit,Balance\n';
            for (let row of currentData) {
                csv += `"${row.Date || ''}","${(row["Bank Remark"] || '').replace(/"/g, '""')}","${row.Debit || ''}","${row.Credit || ''}","${row.Balance || ''}"\n`;
            }

            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', `${currentBank.replace(/\s/g, '_')}_statement.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);

            showStatus('✅ CSV file downloaded successfully!', 'success');
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;

            setTimeout(() => {
                if (statusDiv.className === `status ${type}`) {
                    statusDiv.style.display = 'none';
                    setTimeout(() => {
                        statusDiv.style.display = 'block';
                    }, 0);
                }
            }, 5000);
        }
    </script>
</body>
</html>
